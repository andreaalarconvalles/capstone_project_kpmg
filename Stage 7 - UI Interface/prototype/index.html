<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ARIA — Airbnb Revenue Intelligence &amp; Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet" />
<style>
  :root {
    /* Framer system — defaults to LIGHT (light mode is the default); JS swaps these on toggle */
    --canvas: #ffffff;
    --surface-1: #f4f4f5;
    --surface-2: #e9e9eb;
    --hairline: #e4e4e7;
    --hairline-soft: #efeff1;
    --ink: #0b0b0c;
    --ink-muted: #6b6b73;
    --accent-blue: #0099ff;
    --grad-violet: #6a4cf5;
    --grad-magenta: #d44df0;
    --grad-orange: #ff7a3d;
    --grad-coral: #ff5577;
    --grad-teal: #1fd1c7;
    --success: #16a34a;
    --scroll-thumb: #cfcfd4;

    --r-row: 10px;
    --r-card: 16px;
    --r-tile: 30px;
    --pill: 100px;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--canvas);
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    font-size: 15px;
    line-height: 1.3;
    letter-spacing: -0.15px;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    overflow: hidden;
  }
  #root { height: 100vh; }

  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--scroll-thumb, #2a2a2a); border-radius: 100px; border: 2px solid var(--canvas); }
  ::-webkit-scrollbar-thumb:hover { background: var(--ink-muted, #2e2e2e); }
  * { scrollbar-width: thin; scrollbar-color: var(--scroll-thumb, #2a2a2a) transparent; }

  button { font-family: inherit; letter-spacing: -0.14px; cursor: pointer; border: none; background: none; color: inherit; }
  input, textarea { font-family: inherit; letter-spacing: -0.15px; }
  textarea { resize: none; }
  ::placeholder { color: var(--ink-muted); opacity: 1; }

  .aria-focus:focus-visible { outline: none; box-shadow: 0 0 0 1px rgba(0,153,255,0.45), 0 0 0 4px rgba(0,153,255,0.12); }

  @keyframes ariaFadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
  @keyframes ariaFadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes ariaSpin { to { transform: rotate(360deg); } }
  @keyframes ariaBlink { 0%, 49% { opacity: 1; } 50%, 100% { opacity: 0; } }
  @keyframes ariaScaleIn { from { opacity: 0; transform: translateY(8px) scale(0.97); } to { opacity: 1; transform: none; } }
  @keyframes ariaPulse { 0%,100% { opacity: 0.55; } 50% { opacity: 1; } }

  .aria-spin { animation: ariaSpin 0.8s linear infinite; }
  .aria-cursor { display: inline-block; width: 7px; height: 1.05em; margin-left: 1px; background: var(--ink); vertical-align: -2px; animation: ariaBlink 1s step-end infinite; border-radius: 1px; }
  /* Entrance animations only run once the document is actually visible — so content
     is never frozen-hidden in a background/offscreen tab. Resting state is visible. */
  body.anim-on .aria-fadeup { animation: ariaFadeUp 0.4s cubic-bezier(0.22,1,0.36,1) both; }
  body.anim-on .aria-fadein { animation: ariaFadeIn 0.5s ease both; }
  body.anim-on .aria-scalein { animation: ariaScaleIn 0.16s cubic-bezier(0.22,1,0.36,1) both; }

  /* Markdown-ish answer styling */
  .aria-prose strong { font-weight: 600; color: var(--ink); }
  .aria-prose em { color: var(--ink); font-style: normal; background: var(--surface-2); padding: 1px 5px; border-radius: 5px; font-size: 13.5px; }

  @media print {
    body { overflow: visible; background: #fff; }
    .no-print { display: none !important; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script>
  (function () {
    function on() { document.body && document.body.classList.add("anim-on"); }
    if (document.visibilityState === "visible") on();
    else document.addEventListener("visibilitychange", function h() {
      if (document.visibilityState === "visible") { on(); document.removeEventListener("visibilitychange", h); }
    });
  })();
</script>

</body>
</html>
