name: ARIA CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  reproducibility:
    name: Output contract validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate committed outputs
        run: python scripts/validate_outputs.py

  frontend:
    name: Vite build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Stage 7 - UI Interface/vercel_vite_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

  streamlit-smoke:
    name: Streamlit smoke check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Streamlit host dependencies
        run: pip install -r "Stage 7 - UI Interface/streamlit_app/requirements.txt"

      - name: Compile Streamlit host
        run: python -m compileall "Stage 7 - UI Interface/streamlit_app"
